<!doctype html>
<html lang="en">
	<head>
		<script>
			// Dev only: unregister stale PWA service workers before app JS loads
			if (location.hostname === 'localhost' && 'serviceWorker' in navigator) {
				navigator.serviceWorker.getRegistrations().then(function (regs) {
					regs.forEach(function (r) {
						r.unregister();
					});
				});
				if (typeof caches !== 'undefined') {
					caches.keys().then(function (keys) {
						keys.forEach(function (key) {
							caches.delete(key);
						});
					});
				}
			}
		</script>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, viewport-fit=cover"
		/>
		<meta name="text-scale" content="scale" />
		<title>Fitness Tracker</title>
		<meta name="description" content="Track workouts, exercises, and progress" />
		<meta name="theme-color" content="#0f766e" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-title" content="Fitness" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="mobile-web-app-capable" content="yes" />
		<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		<link rel="stylesheet" href="/smui.css" media="(prefers-color-scheme: light)" />
		<link rel="stylesheet" href="/smui-dark.css" media="screen and (prefers-color-scheme: dark)" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital@0;1&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
			rel="stylesheet"
		/>
		<link
			href="https://fonts.googleapis.com/css2?family=Material+Icons&display=swap"
			rel="stylesheet"
		/>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
